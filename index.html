<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --tac-cyan: #00ff41; --tac-red: #ff3e3e; --bg: #050505; }
        body { 
            background: var(--bg); 
            color: var(--tac-cyan); 
            font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; display: flex; 
            justify-content: center; align-items: center; 
            overflow: hidden;
            /* Dystopian Scanlines */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        #gatekeeper { 
            border: 2px solid var(--tac-cyan); 
            padding: 40px; text-align: center; width: 320px; 
            background: #000; box-shadow: 0 0 20px rgba(0,255,65,0.2);
            transition: all 0.1s;
        }

        /* Glitch Animation */
        .glitch-active { 
            animation: shake 0.2s infinite; 
            border-color: var(--tac-red) !important;
            color: var(--tac-red) !important;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(0, 0); }
        }

        input { background: #111; border: 1px solid var(--tac-cyan); color: var(--tac-cyan); padding: 10px; width: 100%; margin-bottom: 10px; }
        button { background: var(--tac-cyan); color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h3>SECURE_NODE_ALPHA</h3>
        <input type="password" id="key" placeholder="INPUT_KEY_VECTOR...">
        <button onclick="verify()">ACCESS</button>
    </div>

    <script>
        function verify() {
            const key = document.getElementById('key').value;
            const gate = document.getElementById('gatekeeper');
            
            if(key === "ALPHA-9") {
                sessionStorage.setItem('access', 'granted');
                window.location.href = "c2-ops.html";
            } else {
                // Apply glitch class
                gate.classList.add('glitch-active');
                // Remove after 600ms
                setTimeout(() => gate.classList.remove('glitch-active'), 600);
            }
        }
    </script>
</body>
</html>
