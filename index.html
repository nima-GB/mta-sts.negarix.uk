<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --term-green: #00ff41;
            --term-dim: #004d14;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .terminal-window {
            width: 400px;
            border: 1px solid var(--term-green);
            padding: 30px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            position: relative;
            z-index: 5;
        }

        .header { border-bottom: 1px solid var(--term-green); padding-bottom: 10px; margin-bottom: 20px; }
        .meta { font-size: 0.65rem; color: var(--term-dim); margin-bottom: 5px; }

        input {
            background: #000;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        button {
            background: transparent;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            padding: 10px 20px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover:not(:disabled) { background: var(--term-green); color: #000; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .glitch-flash { animation: flash-red 0.5s ease-in-out; }
        @keyframes flash-red { 0%, 100% { border-color: var(--term-green); } 50% { border-color: red; color: red; } }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div class="terminal-window" id="terminal">
        <div class="meta">SYSTEM_ROOT // NEGARIX_OS v.4.02</div>
        <div class="header">
            <h3>SECURE_ENCLAVE_LOGIN</h3>
        </div>
        <p style="font-size: 0.8rem;">IDENTIFY_KEY_VECTOR:</p>
        <input type="password" id="key" placeholder=">_ INPUT_AUTH_KEY" autocomplete="off">
        <button id="auth-btn" onclick="verify()">ESTABLISH_HANDSHAKE</button>
        <div class="meta" style="margin-top: 20px;">ACCESS_LOG: 0x4A2F_LOCKED</div>
    </div>

    <script>
        async function verify() {
            const input = document.getElementById('key').value;
            const term = document.getElementById('terminal');
            const btn = document.getElementById('auth-btn');

            // Hardening: Disable button during transmission
            btn.disabled = true;
            btn.textContent = "HANDSHAKING...";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: input })
                });

                const data = await response.json();

                if (data.authorized) {
                    sessionStorage.setItem('sec_clearance', 'GRANTED');
                    window.location.href = "c2-ops.html";
                } else {
                    term.classList.add('glitch-flash');
                    setTimeout(() => {
                        term.classList.remove('glitch-flash');
                        btn.disabled = false;
                        btn.textContent = "ESTABLISH_HANDSHAKE";
                    }, 500);
                }
            } catch (err) {
                console.error("Connection failed");
                btn.disabled = false;
                btn.textContent = "ESTABLISH_HANDSHAKE";
            }
        }
    </script>
</body>
</html>
